server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10M;

    # Gzip text assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-cache fingerprinted Vite assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reverse-proxy the API and Django admin to the backend service.
    # Serving SPA and API from the same origin means no CORS in production.
    location ~ ^/(api|admin)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django-collected static (admin) and uploaded media.
    location /static/ {
        proxy_pass http://backend:8000;
    }
    location /media/ {
        proxy_pass http://backend:8000;
    }

    # SPA fallback — every other route resolves to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
