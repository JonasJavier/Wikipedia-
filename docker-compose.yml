# Wikiverse — local development stack.
# Brings up PostgreSQL, Redis, the Django API and the React/Vite frontend.
#
#   docker compose up --build
#
# Frontend:  http://localhost:5173
# API docs:  http://localhost:8000/api/docs/
# Admin:     http://localhost:8000/admin/   (admin / adminpass123)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wikiverse}
      POSTGRES_USER: ${POSTGRES_USER:-wikiverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wikiverse}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Host:container — host side uses 5433 to avoid clashing with a local Postgres.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wikiverse}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # Host side uses 6380 to avoid clashing with a local Redis.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DEBUG: "true"
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-me}
      DATABASE_URL: postgres://${POSTGRES_USER:-wikiverse}:${POSTGRES_PASSWORD:-wikiverse}@db:5432/${POSTGRES_DB:-wikiverse}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SEED: "true"
      DJANGO_COLLECTSTATIC: "false"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./backend:/app
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  media:
